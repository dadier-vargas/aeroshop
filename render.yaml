# Render Blueprint — AeroShop E-commerce (plan FREE)
# Docs: https://render.com/docs/blueprint-spec
#
# Nota: el plan gratuito NO admite discos persistentes.
# SQLite usa almacenamiento efímero (los datos se reinician en cada redeploy).
services:
  - type: web
    name: aeroshop
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "true"
      - key: API_BASE_PATH
        value: /api
      - key: ALLOW_SIMULATED_PAYMENTS
        value: "true"
      - key: SEED_DEMO_USERS
        value: "true"
      - key: OAUTH_DEV_ENABLED
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: OAUTH_CALLBACK_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: ALLOW_LOCALHOST_CORS
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false